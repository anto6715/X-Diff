name: Publish to PyPI

# Publishes the package to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in the repo.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   - PyPI Project: xdiffly   (use a "pending publisher" before the first upload)
#   - Owner:        anto6715
#   - Repository:   X-Diff
#   - Workflow:     publish.yml
#   - Environment:  pypi
#
# Release flow: merge the release/X.Y.Z PR into master (the release-changelog
# workflow bumps the version and builds CHANGES.md), then cut a GitHub Release
# tagged X.Y.Z (a leading "v" is also accepted). That triggers this workflow.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
      contents: read

    steps:
      - name: Check out the released tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.29"
          python-version: "3.14"

      - name: Verify the release tag matches the package version
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="$(uv version --short)"
          # Accept the tag with or without a leading "v" (e.g. both "0.4.0" and "v0.4.0").
          if [[ "$tag" != "$version" && "$tag" != "v$version" ]]; then
            echo "Release tag '$tag' does not match package version '$version' (with or without a 'v' prefix)."
            exit 1
          fi

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
