name: Release Changelog

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  update-changelog:
    if: ${{ startsWith(github.head_ref, 'release/') && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out release branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: python -m pip install "poetry==1.8.3"

      - name: Install dependencies
        run: poetry install --with dev

      - name: Derive release version from branch name
        shell: bash
        run: |
          version="${GITHUB_HEAD_REF#release/}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release branch must be named release/X.Y.Z"
            exit 1
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build changelog and bump package version
        run: |
          poetry version "$RELEASE_VERSION"
          poetry run towncrier build --yes --version "$RELEASE_VERSION"

      - name: Commit generated release notes
        shell: bash
        run: |
          if git diff --quiet -- pyproject.toml CHANGELOG.md newsfragments; then
            echo "No changelog changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md newsfragments
          git commit -m "Prepare release $RELEASE_VERSION changelog"
          git push origin HEAD:${GITHUB_HEAD_REF}
