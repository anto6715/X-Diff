name: Release Changelog

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  update-changelog:
    if: ${{ startsWith(github.head_ref, 'release/') && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out release branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.29"
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Derive release version from branch name
        shell: bash
        run: |
          version="${GITHUB_HEAD_REF#release/}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release branch must be named release/X.Y.Z"
            exit 1
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build changelog and bump package version
        shell: bash
        run: |
          shopt -s nullglob
          fragments=(changes.d/*.feature.md changes.d/*.bugfix.md changes.d/*.doc.md changes.d/*.misc.md)
          if [[ ${#fragments[@]} -eq 0 ]]; then
            echo "No changelog fragments left to build; release already applied. Skipping."
            exit 0
          fi
          sed -i "s/^version = .*/version = \"$RELEASE_VERSION\"/" pyproject.toml
          uv run towncrier build --yes --version "$RELEASE_VERSION"

      - name: Commit generated release notes
        shell: bash
        run: |
          if git diff --quiet -- pyproject.toml CHANGES.md changes.d; then
            echo "No changelog changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGES.md changes.d
          git commit -m "Prepare release $RELEASE_VERSION changelog"
          git push origin HEAD:${GITHUB_HEAD_REF}
